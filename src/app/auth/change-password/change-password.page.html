<div class="min-h-screen flex items-center justify-center relative overflow-hidden px-4 sm:px-6 lg:px-8">
  <!-- Dynamic Background glowing effect -->
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-primary-900/10 via-zinc-950 to-zinc-950"></div>
  <div class="absolute top-1/4 left-3/4 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-primary-600/20 rounded-full blur-[120px] pointer-events-none animate-pulse"></div>

  <div class="max-w-md w-full space-y-8 bg-zinc-900/40 backdrop-blur-2xl p-10 rounded-3xl shadow-2xl border border-zinc-800/60 relative z-10 transition-transform duration-500 hover:scale-[1.01]">
    <div>
      <div class="mx-auto w-16 h-16 bg-gradient-to-br from-primary-500 to-primary-700 rounded-2xl flex items-center justify-center shadow-lg shadow-primary-500/30 mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
        </svg>
      </div>
      <h2 class="text-center text-3xl font-extrabold text-white tracking-tight">
        Secure Account
      </h2>
      <p class="mt-2 text-center text-sm text-zinc-400">
        Change your password below
      </p>
    </div>
    
    @if (error()) {
      <div class="bg-red-500/10 border border-red-500/50 rounded-xl p-4 flex items-center gap-3 backdrop-blur-md">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500 shrink-0" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
        </svg>
        <p class="text-sm text-red-400 font-medium">{{ error() }}</p>
      </div>
    }

    @if (successMessage) {
      <div class="bg-primary-500/10 border border-primary-500/50 rounded-xl p-4 flex items-center gap-3 backdrop-blur-md">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-primary-400 shrink-0" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
        </svg>
        <p class="text-sm text-primary-300 font-medium">{{ successMessage }}</p>
      </div>
    }

    <form class="mt-8 space-y-5" [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()">
      <div>
        <label for="current_password" class="block text-sm font-medium text-zinc-300 mb-1.5">Current Password</label>
        <input id="current_password" type="password" formControlName="current_password" required class="input-field" placeholder="••••••••">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-zinc-300 mb-1.5">New Password</label>
        <input id="password" type="password" formControlName="password" required class="input-field" placeholder="••••••••">
      </div>
      <div>
        <label for="password_confirmation" class="block text-sm font-medium text-zinc-300 mb-1.5">Confirm New Password</label>
        <input id="password_confirmation" type="password" formControlName="password_confirmation" required class="input-field" placeholder="••••••••">
      </div>

      <div class="pt-2">
        <button type="submit" [disabled]="changePasswordForm.invalid || isLoading()" class="btn-primary">
          @if (isLoading()) {
            <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Updating...
          } @else {
            Update Password
          }
        </button>
      </div>

      <div class="text-sm text-center pt-4 border-t border-zinc-800/80">
        <a routerLink="/" class="font-medium text-zinc-400 hover:text-white transition-colors flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Back to Dashboard
        </a>
      </div>
    </form>
  </div>
</div>
