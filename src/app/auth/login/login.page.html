<div class="min-h-screen flex items-center justify-center relative overflow-hidden px-4 sm:px-6 lg:px-8">
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-primary-900/20 via-zinc-950 to-zinc-950"></div>
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary-600/20 rounded-full blur-[120px] pointer-events-none animate-pulse"></div>

  <div class="relative z-10 max-w-md w-full space-y-8 bg-zinc-900/40 backdrop-blur-2xl p-10 rounded-3xl shadow-2xl border border-zinc-800/60 transition-transform duration-500 hover:scale-[1.01]">
    <div class="text-center">
      <div class="mx-auto w-16 h-16 bg-gradient-to-br from-primary-500 to-primary-700 rounded-2xl flex items-center justify-center shadow-lg shadow-primary-500/30 mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h2 class="text-3xl font-extrabold text-white tracking-tight">
        Secure Login
      </h2>
      <p class="mt-2 text-sm text-zinc-400">
        Enter your credentials to access your workspace
      </p>
    </div>

    @if (error()) {
      <div class="bg-red-500/10 border border-red-500/50 rounded-xl p-4 flex items-center gap-3 backdrop-blur-md">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500 shrink-0" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
        </svg>
        <p class="text-sm text-red-400 font-medium">{{ error() }}</p>
      </div>
    }

    <ng-container *ngIf="loginAllowed; else noSiteCode">
      <form class="mt-8 space-y-5" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div>
          <label for="email-address" class="block text-sm font-medium text-zinc-300 mb-1.5">Email address</label>
          <input id="email-address" type="email" formControlName="email" required class="input-field" placeholder="name@company.com" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-zinc-300 mb-1.5">Password</label>
          <input id="password" type="password" formControlName="password" required class="input-field" placeholder="••••••••" />
        </div>

        <div class="py-2">
          <button type="submit" [disabled]="loginForm.invalid || isLoading()" class="w-full btn-primary flex items-center justify-center gap-2">
          @if (isLoading()) {
            <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
            </svg>
            Processing...
          } @else {
            Sign in
          }
        </button>
      </div>

      <div class="text-xs text-zinc-400">
        URL params: <code>site_code</code> (requerido), <code>url</code> o <code>redirect_url</code> (opcional)
      </div>

      <div class="text-sm text-center pt-4 border-t border-zinc-800/80">
        <span class="text-zinc-400">Don't have an account? </span>
        <a routerLink="/auth/register" class="font-medium text-primary-400 hover:text-primary-300 transition-colors">
          Create one now
        </a>
      </div>
    </form>
    </ng-container>

    <ng-template #noSiteCode>
      <div class="mt-8 text-center text-sm text-amber-300 bg-amber-900/20 border border-amber-700 rounded-lg p-4">
        Site code query parameter missing. Use <code>?site_code=1</code> and optional <code>redirect_url</code>.
      </div>
    </ng-template>
  </div>
</div>
