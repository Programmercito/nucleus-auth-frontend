<div class="min-h-screen flex flex-col items-center justify-center bg-slate-50 px-4 sm:px-6 lg:px-8">

  <!-- Subtle background pattern -->
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_70%_50%_at_50%_0%,_oklch(0.93_0.055_250_/_0.4),_transparent)] pointer-events-none"></div>

  <!-- Card -->
  <div class="relative max-w-md w-full space-y-6 bg-white rounded-2xl p-8 sm:p-10
              shadow-[0_4px_24px_0_oklch(0.47_0.22_250_/_0.08),0_1px_3px_0_rgb(0,0,0,0.06)]
              border border-slate-100">

    <!-- Header -->
    <div class="flex flex-col items-center gap-3 pb-2">
      <div class="w-12 h-12 rounded-xl bg-primary-600 flex items-center justify-center shadow-md shadow-primary-600/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <div class="text-center">
        <h1 class="text-xl font-bold text-slate-900 tracking-tight" style="font-family: 'Georgia', 'Cambria', serif;">
          <span class="text-primary-600">Devcit</span> Services Login
        </h1>
        <p class="mt-1 text-sm text-slate-500">Sign in to continue</p>
      </div>
    </div>

    <!-- Success banner -->
    @if (successMessage()) {
      <div class="rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 flex items-start gap-3">
        <svg class="h-4 w-4 text-emerald-500 shrink-0 mt-0.5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        <p class="text-sm text-emerald-700">{{ successMessage() }}</p>
      </div>
    }

    <!-- Error banner -->
    @if (error()) {
      <div class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 flex items-start gap-3">
        <svg class="h-4 w-4 text-red-500 shrink-0 mt-0.5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        <p class="text-sm text-red-700">{{ error() }}</p>
      </div>
    }

    <ng-container *ngIf="loginAllowed; else noSiteCode">
      <form class="space-y-5" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <div>
          <label for="login-email" class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
          <input id="login-email" type="email" formControlName="email" class="input-field" placeholder="name@company.com" />
        </div>

        <div>
          <label for="login-password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input id="login-password" type="password" formControlName="password" class="input-field" placeholder="••••••••" />
        </div>

        <div class="pt-1">
          <button type="submit" [disabled]="loginForm.invalid || isLoading()" class="btn-primary flex items-center justify-center gap-2">
            @if (isLoading()) {
              <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
              </svg>
              Signing in…
            } @else {
              Sign in
            }
          </button>
        </div>

        <p class="text-center text-sm text-slate-500 pt-2 border-t border-slate-100">
          No account yet?
          <a routerLink="/auth/register" class="text-primary-600 hover:text-primary-500 font-medium transition-colors ml-1">Create one</a>
        </p>

      </form>
    </ng-container>

    <ng-template #noSiteCode>
      <div class="rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800 text-center">
        Site code missing. Pass <code class="font-mono text-xs">?site_code=&lt;value&gt;</code> in the URL.
      </div>
    </ng-template>
  </div>

  <!-- Footer pinned bottom -->
  <div class="absolute bottom-5 left-0 right-0 flex justify-center">
    <p class="text-xs text-slate-400">
      Made by
      <a href="https://devcito.org" target="_blank" rel="noopener noreferrer"
         class="text-primary-600 hover:text-primary-500 font-medium transition-colors">
        devcito
      </a>
    </p>
  </div>
</div>
