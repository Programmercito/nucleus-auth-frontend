<div class="min-h-screen flex items-center justify-center relative overflow-hidden px-4 sm:px-6 lg:px-8 py-12">
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_bottom,_var(--tw-gradient-stops))] from-primary-900/20 via-zinc-950 to-zinc-950"></div>
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary-600/10 rounded-full blur-[150px] pointer-events-none"></div>

  <div class="max-w-md w-full space-y-8 bg-zinc-900/40 backdrop-blur-2xl p-10 rounded-3xl shadow-2xl border border-zinc-800/60 relative z-10 transition-transform duration-500 hover:scale-[1.01]">
    <div>
      <div class="mx-auto w-16 h-16 bg-gradient-to-br from-primary-500 to-primary-700 rounded-2xl flex items-center justify-center shadow-lg shadow-primary-500/30 mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
        </svg>
      </div>
      <h2 class="text-center text-3xl font-extrabold text-white tracking-tight">
        Join Nucleus
      </h2>
      <p class="mt-2 text-center text-sm text-zinc-400">
        Create your new account
      </p>
    </div>
    
    @if (error()) {
      <div class="bg-red-500/10 border border-red-500/50 rounded-xl p-4 flex items-center gap-3 backdrop-blur-md">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500 shrink-0" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
        </svg>
        <p class="text-sm text-red-400 font-medium">{{ error() }}</p>
      </div>
    }

    <ng-container *ngIf="registerAllowed; else noSiteCode">
      <form class="mt-8 space-y-4" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div>
          <label for="name" class="block text-sm font-medium text-zinc-300 mb-1.5">Full Name</label>
          <input id="name" type="text" formControlName="name" required class="input-field" placeholder="John Doe" />
        </div>
        <div>
          <label for="email-address" class="block text-sm font-medium text-zinc-300 mb-1.5">Email address</label>
          <input id="email-address" type="email" formControlName="email" required class="input-field" placeholder="name@company.com" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-zinc-300 mb-1.5">Password</label>
          <input id="password" type="password" formControlName="password" required class="input-field" placeholder="••••••••" />
        </div>
        <div>
          <label for="password_confirmation" class="block text-sm font-medium text-zinc-300 mb-1.5">Confirm Password</label>
          <input id="password_confirmation" type="password" formControlName="password_confirmation" required class="input-field" placeholder="••••••••" />
        </div>

      <div class="pt-4">
        <button type="submit" [disabled]="registerForm.invalid || isLoading()" class="btn-primary">
          @if (isLoading()) {
            <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Creating account...
          } @else {
            Register
          }
        </button>
      </div>

      <div class="text-sm text-center pt-4 border-t border-zinc-800/80">
        <span class="text-zinc-400">Already a member? </span>
        <a routerLink="/auth/login" class="font-medium text-primary-400 hover:text-primary-300 transition-colors">
          Sign in here
        </a>
      </div>
    </form>
    </ng-container>

    <ng-template #noSiteCode>
      <div class="mt-8 text-center text-sm text-amber-300 bg-amber-900/20 border border-amber-700 rounded-lg p-4">
        Site code is required to register. Pass <code>?site_code=1</code> once and se mantendrá en <code>sessionStorage</code> para futuros accesos.
      </div>
    </ng-template>
  </div>
</div>
